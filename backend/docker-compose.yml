services:
  db:
    image: postgres:16
    container_name: licenta_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: licenta
      POSTGRES_USER: licenta
      POSTGRES_PASSWORD: licenta
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: