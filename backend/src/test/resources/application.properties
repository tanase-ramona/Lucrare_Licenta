# Test profile: in-memory H2 DB so tests don't touch the dev Postgres DB
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# JWT
app.jwt.secret=test-secret-key-for-jwt-tests-must-be-at-least-32-bytes-long
app.jwt.expiration-ms=86400000

# JDoodle / Groq - not used by these tests, dummy values
jdoodle.client-id=test-client-id
jdoodle.client-secret=test-client-secret
groq.api.key=
groq.model=llama-3.3-70b-versatile
groq.max-tokens=1200
