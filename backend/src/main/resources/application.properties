server.port=${SERVER_PORT:8080}
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties],optional:file:backend/.env[.properties]

# PostgreSQL (Docker)
spring.datasource.url=jdbc:postgresql://localhost:5432/licenta
spring.datasource.username=licenta
spring.datasource.password=licenta
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.web.error.include-message=on_param
spring.web.error.include-binding-errors=on_param
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.springframework.security=DEBUG
# JWT
app.jwt.secret=CHANGE_ME_SUPER_SECRET_64_CHARS_MINIMUM____________________
app.jwt.expiration-ms=86400000

# JDoodle Code Execution
jdoodle.client-id=YOUR_CLIENT_ID
jdoodle.client-secret=YOUR_CLIENT_SECRET

# Groq AI
groq.api.key=${GROQ_API_KEY:}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}
groq.max-tokens=${GROQ_MAX_TOKENS:1200}
logging.level.com.licenta.backend.interviews.core.service=DEBUG
logging.level.root=INFO
